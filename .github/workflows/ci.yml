name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── ShellCheck ─────────────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint deployr entrypoint
        run: shellcheck -S warning deployr

      - name: Lint lib/
        run: find lib/ -name "*.sh" -print0 | xargs -0 shellcheck -S warning

  # ─── BATS Tests ─────────────────────────────────────────────────────────────
  bats:
    name: BATS Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Run unit tests
        run: bats --tap tests/unit/
